<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDO Biñan City - Admin Portal</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" href="calendar.png" type="image/jpg">
    <link rel="apple-touch-icon" href="calendar.png">

    <!-- Clean, professional font library -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
        background: #0f172a; 
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('SdoBuilding.png'); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      /* Dark executive background overlay tint */
      #splash-screen::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.85), rgba(30, 41, 59, 0.75));
        z-index: 1;
      }

      /* Admin Control Panel Box */
      .admin-card {
        position: relative;
        z-index: 2;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px 50px;
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        text-align: center;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
      }

      /* Admin Badge / Icon Header */
      .admin-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .admin-icon svg {
        width: 32px;
        height: 32px;
        fill: #38bdf8; /* Modern blue accent */
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 8px 0;
        letter-spacing: -0.5px;
        color: #f8fafc;
      }

      .subtitle {
        font-size: 14px;
        color: #94a3b8;
        margin: 0 0 32px 0;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
      }

      /* Professional Admin Button styling */
      .admin-btn {
        display: block;
        width: 100%;
        padding: 14px;
        background: #0284c7;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.5px;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.3);
        transition: all 0.2s ease;
      }

      .admin-btn:hover {
        background: #0369a1;
        transform: translateY(-1px);
        box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.4);
      }

      .admin-btn:active {
        transform: translateY(1px);
      }

      .footer-tag {
        margin-top: 24px;
        font-size: 11px;
        color: #64748b;
        letter-spacing: 0.5px;
      }

      iframe { 
        width: 100%; height: 100%; border: none; 
      }
    </style>
  </head>
  <body>

    <!-- Splash Screen Panel Container -->
    <div id="splash-screen">
      <div class="admin-card">
        
        <!-- Admin Security Shield Badge -->
        <div class="admin-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
          </svg>
        </div>

        <h1>SDO Biñan City</h1>
        <div class="subtitle">Management Console</div>
        
        <!-- Interactive Launcher Button -->
        <button class="admin-btn" onclick="launchApp()">
          LAUNCH CALENDAR ADMIN
        </button>

        <div class="footer-tag">Authorized Administrative Access Only</div>
      </div>
    </div>

    <!-- Active Management Framework Frame -->
    <iframe 
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbxnQZm6q-TI3OsuyJFg0umz8wgI3o8_DN2asb5aubBNJv-l6lR586tuQppTmJqbB3ug/exec?p=admin"
      allow="geolocation; camera; microphone" 
      allowfullscreen="true">
    </iframe>

    <script>
      function launchApp() {
        const splash = document.getElementById("splash-screen");
        
        // Hide Splash
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 500);
        
        // Request Fullscreen
        document.documentElement.requestFullscreen().catch((err) => {
          console.warn(`Fullscreen skipped: ${err.message}`);
        });
      }
    </script>
  </body>
</html>
